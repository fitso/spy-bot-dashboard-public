<!doctype html>
<html><head><meta charset="utf-8"><title>Consolidated Bot Dashboard</title>
<style>
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:24px}
h1{margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px}
.card h2{margin:0 0 12px;font-size:18px;color:#58a6ff}
.row{display:flex;justify-content:space-between;margin:6px 0;font-size:14px}
.pos{color:#3fb950}.neg{color:#f85149}.muted{color:#8b949e}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.on{background:#238636;color:#fff}.off{background:#484f58;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:24px;font-size:13px}
th,td{padding:8px;border-bottom:1px solid #30363d;text-align:left}
th{color:#8b949e;font-weight:600}
</style></head><body>
<h1>Consolidated Trading Bot <span id="updated" class="muted" style="font-size:14px;font-weight:400"></span></h1>
<div id="cards" class="grid"></div>
<h2 style="margin-top:32px">Recent Trades</h2>
<table id="trades"><thead><tr><th>Time</th><th>Sub-Bot</th><th>Strategy</th><th>Side</th><th>P&amp;L</th><th>Note</th></tr></thead><tbody></tbody></table>
<script>
const fmt=n=>n>=0?`+$${n.toFixed(2)}`:`-$${Math.abs(n).toFixed(2)}`;
const cls=n=>n>=0?'pos':'neg';
async function load(){
  const r=await fetch('dashboard_data_consolidated.json?t='+Date.now(),{cache:'no-store'});
  const d=await r.json();
  document.getElementById('updated').textContent=d.last_updated?'updated '+new Date(d.last_updated).toLocaleTimeString():'';
  const cards=document.getElementById('cards');cards.innerHTML='';
  for(const[name,sb]of Object.entries(d.sub_bots)){
    const pct=((sb.equity-sb.starting_capital)/sb.starting_capital*100);
    cards.insertAdjacentHTML('beforeend',`<div class="card">
      <h2>${name.toUpperCase()} <span class="badge ${sb.enabled?'on':'off'}">${sb.enabled?'LIVE':'OFF'}</span></h2>
      <div class="row"><span class="muted">Starting</span><span>$${sb.starting_capital.toFixed(2)}</span></div>
      <div class="row"><span class="muted">Equity</span><span class="${cls(sb.equity-sb.starting_capital)}">$${sb.equity.toFixed(2)} (${pct>=0?'+':''}${pct.toFixed(1)}%)</span></div>
      <div class="row"><span class="muted">Daily P&amp;L</span><span class="${cls(sb.daily_pnl)}">${fmt(sb.daily_pnl)}</span></div>
      <div class="row"><span class="muted">Total P&amp;L</span><span class="${cls(sb.total_pnl)}">${fmt(sb.total_pnl)}</span></div>
      <div class="row"><span class="muted">Trades today</span><span>${sb.trades_today}</span></div>
      <div class="row"><span class="muted">Open positions</span><span>${sb.open_positions}</span></div>
    </div>`);
  }
  const tb=document.querySelector('#trades tbody');tb.innerHTML='';
  (d.all_trades||[]).slice().reverse().forEach(t=>{
    tb.insertAdjacentHTML('beforeend',`<tr><td>${new Date(t.ts).toLocaleTimeString()}</td><td>${t.sub_bot}</td><td>${t.strategy}</td><td>${t.side}</td><td class="${cls(t.pnl)}">${fmt(t.pnl)}</td><td class="muted">${t.note||''}</td></tr>`);
  });
}
load();setInterval(load,5000);
</script></body></html>
